# DPM package spec file
# Used to build packages

min client version: 1.0
# metadata describes the package to the user
metadata:
  id: VSoft.CancellationToken
  authors: [ Vincent Parrett ]
  description: Enables cooperative cancellation between threads
  projectUrl: https://github.com/VSoftTechnologies/VSoft.CancellationToken
  repositoryUrl: https://github.com/VSoftTechnologies/VSoft.CancellationToken
  license: Apache-2.0
  readme: README.md
  copyright: Vincent Parrett and contributors
  tags: [ cancellation, async, threads ]
  version: 0.1.4
  repositoryCommit: #HASH#

# define variable defaults - can be overriden in targetPlatforms
variables:
  packageSource: "Rad Studio $compilernoprefix$"

# package folder names are a mess. 
targetPlatforms:
  - compiler from: delphixe2
    compiler to: delphi13.0
    platforms: [ win32, win64 ]

templates:
  - name: default

    source:
      - src: ./LICENSE.txt
      - src: ./source/*.pas
      - src: ./packages/$packageSource$/*.dpk
        dest: ./packages/$packageSource$
      - src: ./packages/$packageSource$/*.dproj
        dest: ./packages/$packageSource$
    build:
      - project: ./packages/$packageSource$/VSoft.CancellationTokenR.dproj
